<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PlaceIQ — Smart Placement Guidance</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #151d2e;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --green: #10b981;
    --red: #ef4444;
    --gold: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .container { max-width: 960px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  /* Header */
  header {
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }
  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .logo-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .logo-text { font-family: var(--font-head); font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
  .logo-text span { color: var(--accent); }
  .tagline { color: var(--muted); font-size: 14px; font-weight: 300; margin-left: 52px; }

  /* Section headers */
  .section-label {
    font-family: var(--font-head);
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 2px;
    color: var(--accent); margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Grid layout */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

  /* Input groups */
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  input[type="number"], input[type="range"] {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    padding: 10px 14px;
    transition: border-color .2s, box-shadow .2s;
    width: 100%;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
  }

  /* Slider fields */
  .slider-field { grid-column: 1 / -1; }
  .slider-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 600px) { .slider-row { grid-template-columns: 1fr; } }

  .slider-group { display: flex; flex-direction: column; gap: 8px; }
  .slider-header { display: flex; justify-content: space-between; align-items: center; }
  .slider-val {
    font-family: var(--font-head); font-size: 18px; font-weight: 700;
    color: var(--accent);
  }
  input[type="range"] {
    padding: 0; height: 4px; cursor: pointer;
    -webkit-appearance: none; appearance: none;
    background: linear-gradient(to right, var(--accent) 0%, var(--border) 0%);
    border-radius: 4px; border: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--accent);
    cursor: pointer; box-shadow: 0 0 8px rgba(0,212,255,0.5);
  }

  /* Submit button */
  .submit-wrap { margin-top: 32px; display: flex; justify-content: center; }
  .btn-predict {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 12px;
    color: #fff; cursor: pointer;
    font-family: var(--font-head); font-size: 16px; font-weight: 700;
    letter-spacing: 0.5px;
    padding: 16px 48px;
    position: relative; overflow: hidden;
    transition: transform .2s, box-shadow .2s;
  }
  .btn-predict:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,212,255,0.3); }
  .btn-predict:active { transform: translateY(0); }
  .btn-predict.loading { opacity: 0.7; cursor: not-allowed; }

  /* Loader */
  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin .7s linear infinite; vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Result card */
  #result {
    margin-top: 48px;
    display: none;
    animation: fadeUp .4s ease both;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media (max-width: 560px) { .result-grid { grid-template-columns: 1fr; } }

  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
  }
  .result-card.placed { border-color: var(--green); }
  .result-card.not-placed { border-color: var(--red); }

  .rc-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 6px; }
  .rc-value { font-family: var(--font-head); font-size: 32px; font-weight: 800; }
  .rc-value.yes { color: var(--green); }
  .rc-value.no  { color: var(--red); }
  .rc-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* Confidence bar */
  .conf-bar-wrap { margin-top: 12px; }
  .conf-bar-bg { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .conf-bar-fill { height: 100%; border-radius: 3px; transition: width 1s cubic-bezier(.4,0,.2,1); }

  /* Role card */
  .role-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px;
    display: flex; align-items: flex-start; gap: 20px;
  }
  .role-icon { font-size: 40px; line-height: 1; }
  .role-details { flex: 1; }
  .role-name { font-family: var(--font-head); font-size: 24px; font-weight: 800; margin-bottom: 4px; }
  .role-pkg { font-size: 13px; color: var(--gold); font-weight: 500; margin-bottom: 12px; }

  /* Tips */
  .tips-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .tips-list li {
    display: flex; align-items: flex-start; gap: 8px;
    font-size: 14px; color: var(--muted);
  }
  .tips-list li::before { content: '→'; color: var(--accent); flex-shrink: 0; }

  /* Role probability bars */
  .proba-section { margin-top: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px; }
  .proba-title { font-family: var(--font-head); font-size: 14px; font-weight: 700; margin-bottom: 14px; color: var(--text); }
  .proba-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .proba-row:last-child { margin-bottom: 0; }
  .proba-lbl { font-size: 13px; width: 130px; flex-shrink: 0; }
  .proba-bar-bg { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .proba-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent2), var(--accent)); transition: width 1s cubic-bezier(.4,0,.2,1); }
  .proba-pct { font-size: 12px; color: var(--muted); width: 38px; text-align: right; flex-shrink: 0; }

  /* Error box */
  .error-box {
    background: rgba(239,68,68,0.1); border: 1px solid var(--red);
    border-radius: 10px; padding: 14px 18px;
    color: #fca5a5; font-size: 14px; margin-top: 20px;
    display: none;
  }

  .section-gap { margin-bottom: 32px; }
  hr.divider { border: none; border-top: 1px solid var(--border); margin: 36px 0; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">🎓</div>
      <div class="logo-text">Place<span>IQ</span></div>
    </div>
    <div class="tagline">AI-powered placement prediction &amp; career guidance for engineering students</div>
  </header>

  <!-- ACADEMIC PROFILE -->
  <div class="section-gap">
    <div class="section-label">Academic Profile</div>
    <div class="form-grid">
      <div class="field">
        <label>CGPA (0–10)</label>
        <input type="number" id="cgpa" min="0" max="10" step="0.01" placeholder="e.g. 8.5"/>
      </div>
      <div class="field">
        <label>Active Backlogs</label>
        <input type="number" id="backlogs" min="0" max="20" placeholder="e.g. 0"/>
      </div>
      <div class="field">
        <label>Current Semester</label>
        <input type="number" id="semester" min="1" max="8" placeholder="e.g. 7"/>
      </div>
      <div class="field">
        <label>Projects Completed</label>
        <input type="number" id="projects_count" min="0" placeholder="e.g. 4"/>
      </div>
    </div>
  </div>

  <hr class="divider"/>

  <!-- COMPETITIVE PROGRAMMING -->
  <div class="section-gap">
    <div class="section-label">Competitive Programming</div>
    <div class="form-grid">
      <div class="field">
        <label>LeetCode Rating</label>
        <input type="number" id="leetcode_rating" min="0" max="4000" placeholder="e.g. 1500"/>
      </div>
      <div class="field">
        <label>CodeChef Rating</label>
        <input type="number" id="codechef_rating" min="0" max="3000" placeholder="e.g. 1200"/>
      </div>
      <div class="field">
        <label>Contests Won</label>
        <input type="number" id="contests_won" min="0" placeholder="e.g. 2"/>
      </div>
      <div class="field">
        <label>Hackathons Participated</label>
        <input type="number" id="hackathons" min="0" placeholder="e.g. 3"/>
      </div>
      <div class="field" style="grid-column:1/-1">
        <label>Internships Done</label>
        <input type="number" id="internships" min="0" placeholder="e.g. 1"/>
      </div>
    </div>
  </div>

  <hr class="divider"/>

  <!-- SKILL SCORES -->
  <div class="section-gap">
    <div class="section-label">Skill Self-Assessment (1–10)</div>
    <div class="slider-row">
      <div class="slider-group">
        <div class="slider-header">
          <label>Communication</label>
          <span class="slider-val" id="val_communication_score">5</span>
        </div>
        <input type="range" id="communication_score" min="1" max="10" step="0.5" value="5" oninput="updateSlider(this)"/>
      </div>
      <div class="slider-group">
        <div class="slider-header">
          <label>Leadership</label>
          <span class="slider-val" id="val_leadership_score">5</span>
        </div>
        <input type="range" id="leadership_score" min="1" max="10" step="0.5" value="5" oninput="updateSlider(this)"/>
      </div>
      <div class="slider-group">
        <div class="slider-header">
          <label>Data Structures</label>
          <span class="slider-val" id="val_ds_score">5</span>
        </div>
        <input type="range" id="ds_score" min="1" max="10" step="0.5" value="5" oninput="updateSlider(this)"/>
      </div>
      <div class="slider-group">
        <div class="slider-header">
          <label>Machine Learning</label>
          <span class="slider-val" id="val_ml_score">5</span>
        </div>
        <input type="range" id="ml_score" min="1" max="10" step="0.5" value="5" oninput="updateSlider(this)"/>
      </div>
      <div class="slider-group">
        <div class="slider-header">
          <label>Web Development</label>
          <span class="slider-val" id="val_web_score">5</span>
        </div>
        <input type="range" id="web_score" min="1" max="10" step="0.5" value="5" oninput="updateSlider(this)"/>
      </div>
      <div class="slider-group">
        <div class="slider-header">
          <label>Embedded / Core</label>
          <span class="slider-val" id="val_embedded_score">5</span>
        </div>
        <input type="range" id="embedded_score" min="1" max="10" step="0.5" value="5" oninput="updateSlider(this)"/>
      </div>
    </div>
  </div>

  <div class="submit-wrap">
    <button class="btn-predict" id="predictBtn" onclick="predict()">
      Analyse My Profile →
    </button>
  </div>

  <div class="error-box" id="errorBox"></div>

  <!-- RESULT -->
  <div id="result">
    <hr class="divider"/>
    <div class="section-label">Prediction Results</div>

    <div class="result-grid">
      <!-- Placement -->
      <div class="result-card" id="placementCard">
        <div class="rc-label">Placement Likelihood</div>
        <div class="rc-value" id="placementVal">—</div>
        <div class="rc-sub" id="placementConf"></div>
        <div class="conf-bar-wrap">
          <div class="conf-bar-bg">
            <div class="conf-bar-fill" id="confBar" style="width:0%"></div>
          </div>
        </div>
      </div>

      <!-- Role -->
      <div class="result-card">
        <div class="rc-label">Best-Fit Role</div>
        <div class="rc-value" style="font-size:22px" id="roleVal">—</div>
        <div class="rc-sub" id="rolePkg"></div>
        <div class="conf-bar-wrap">
          <div class="conf-bar-bg">
            <div class="conf-bar-fill" id="roleBar" style="width:0%; background: linear-gradient(90deg, #7c3aed, #a855f7)"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Role detail + tips -->
    <div class="role-card" id="roleDetail" style="margin-bottom:16px">
      <div class="role-icon" id="roleIcon">🎯</div>
      <div class="role-details">
        <div class="role-name" id="roleName"></div>
        <div class="role-pkg" id="rolePackage"></div>
        <ul class="tips-list" id="tipsList"></ul>
      </div>
    </div>

    <!-- Role probabilities -->
    <div class="proba-section">
      <div class="proba-title">Role Fit Distribution</div>
      <div id="probaRows"></div>
    </div>
  </div>

</div>

<script>
  // Update slider fill gradient and display value
  function updateSlider(el) {
    const min = +el.min, max = +el.max, val = +el.value;
    const pct = ((val - min) / (max - min)) * 100;
    el.style.background = `linear-gradient(to right, var(--accent) ${pct}%, var(--border) ${pct}%)`;
    document.getElementById('val_' + el.id).textContent = val;
  }

  // Init sliders
  document.querySelectorAll('input[type="range"]').forEach(updateSlider);

  function getVal(id) {
    return document.getElementById(id).value;
  }

  async function predict() {
    const btn = document.getElementById('predictBtn');
    const errorBox = document.getElementById('errorBox');
    errorBox.style.display = 'none';

    // Basic validation
    const numericFields = ['cgpa','backlogs','semester','leetcode_rating',
      'codechef_rating','contests_won','hackathons','internships','projects_count'];
    for (const f of numericFields) {
      if (getVal(f) === '') {
        errorBox.textContent = `Please fill in: ${f.replace(/_/g,' ')}`;
        errorBox.style.display = 'block';
        return;
      }
    }

    btn.classList.add('loading');
    btn.innerHTML = '<span class="spinner"></span> Analysing...';

    const payload = {
      cgpa:               parseFloat(getVal('cgpa')),
      backlogs:           parseInt(getVal('backlogs')),
      semester:           parseInt(getVal('semester')),
      leetcode_rating:    parseFloat(getVal('leetcode_rating')),
      codechef_rating:    parseFloat(getVal('codechef_rating')),
      contests_won:       parseInt(getVal('contests_won')),
      hackathons:         parseInt(getVal('hackathons')),
      internships:        parseInt(getVal('internships')),
      projects_count:     parseInt(getVal('projects_count')),
      communication_score:parseFloat(getVal('communication_score')),
      leadership_score:   parseFloat(getVal('leadership_score')),
      ds_score:           parseFloat(getVal('ds_score')),
      ml_score:           parseFloat(getVal('ml_score')),
      web_score:          parseFloat(getVal('web_score')),
      embedded_score:     parseFloat(getVal('embedded_score')),
    };

    try {
      const res  = await fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();

      if (data.error) throw new Error(data.error);

      showResult(data);
    } catch (e) {
      errorBox.textContent = '⚠ ' + e.message + ' — Make sure Flask is running: python app.py';
      errorBox.style.display = 'block';
    } finally {
      btn.classList.remove('loading');
      btn.innerHTML = 'Analyse My Profile →';
    }
  }

  function showResult(d) {
    const result = document.getElementById('result');
    result.style.display = 'block';
    result.scrollIntoView({ behavior: 'smooth', block: 'start' });

    // Placement card
    const pCard = document.getElementById('placementCard');
    const pVal  = document.getElementById('placementVal');
    const pConf = document.getElementById('placementConf');
    const pBar  = document.getElementById('confBar');

    pVal.textContent = d.placement;
    pVal.className   = 'rc-value ' + (d.placement === 'Yes' ? 'yes' : 'no');
    pCard.className  = 'result-card ' + (d.placement === 'Yes' ? 'placed' : 'not-placed');
    pConf.textContent = `Confidence: ${Math.round(d.confidence * 100)}%`;
    pBar.style.background = d.placement === 'Yes'
      ? 'linear-gradient(90deg,#10b981,#34d399)'
      : 'linear-gradient(90deg,#ef4444,#f87171)';
    setTimeout(() => { pBar.style.width = (d.confidence * 100) + '%'; }, 50);

    // Role card
    document.getElementById('roleVal').textContent = d.role_icon + ' ' + d.role;
    document.getElementById('rolePkg').textContent = 'Avg Package: ' + d.avg_package;
    setTimeout(() => {
      document.getElementById('roleBar').style.width = (d.best_fit_score * 100) + '%';
    }, 50);

    // Role detail
    document.getElementById('roleIcon').textContent = d.role_icon;
    document.getElementById('roleName').textContent  = d.role;
    document.getElementById('rolePackage').textContent = '💰 Avg Package: ' + d.avg_package;
    const tips = document.getElementById('tipsList');
    tips.innerHTML = d.tips.map(t => `<li>${t}</li>`).join('');

    // Probabilities
    const probaRows = document.getElementById('probaRows');
    const entries = Object.entries(d.role_probabilities).sort((a,b) => b[1]-a[1]);
    probaRows.innerHTML = entries.map(([role, prob]) => `
      <div class="proba-row">
        <span class="proba-lbl">${role}</span>
        <div class="proba-bar-bg">
          <div class="proba-bar-fill" style="width:0%" data-width="${prob*100}%"></div>
        </div>
        <span class="proba-pct">${Math.round(prob*100)}%</span>
      </div>
    `).join('');

    setTimeout(() => {
      document.querySelectorAll('.proba-bar-fill').forEach(el => {
        el.style.width = el.dataset.width;
      });
    }, 100);
  }
</script>
</body>
</html>
